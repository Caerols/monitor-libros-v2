name: Escáner Diario de Buscalibre

on:
  schedule:
    # Se ejecuta a las 08:00 AM horario UTC (que son las 04:00 AM en Chile)
    - cron: '0 14 * * *'
  workflow_dispatch: # Esto te permite darle "Play" manualmente desde la web de GitHub

jobs:
  barrido-nocturno:
    runs-on: ubuntu-latest

    steps:
    - name: Extraer código del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Despertar al scraper e iniciar escaneo
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python app-libros.py