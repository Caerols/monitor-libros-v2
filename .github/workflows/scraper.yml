name: Monitor de Libros Diario

on:
  schedule:
    # Esto se ejecuta todos los días a las 13:00 UTC (9:00 AM hora de Chile)
    - cron: '0 13 * * *' 
  workflow_dispatch: # Te agrega un botón en GitHub para ejecutarlo manual cuando quieras

jobs:
  ejecutar-etl:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Ejecutar el Scraper
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python app-libros.py