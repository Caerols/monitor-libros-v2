name: Monitor de Precios Buscalibre

on:
  schedule:
    # Ejecución automática a las 13:00 UTC (10:00 AM hora de Chile)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite gatillar la ejecución de forma manual desde la web

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar el repositorio actual
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Ejecutar el Scraper de Libros
      env:
        # Aquí conectamos el secreto de GitHub con la variable que espera Python
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python app-libros.py

    - name: Guardar cambios en el JSON historial
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add historial_libros.json
        git commit -m "Auto-update: Historial de precios" || exit 0
        git push