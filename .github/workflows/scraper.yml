name: Bot Extractor de Precios Diarios

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar el repositorio actual
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 psycopg2-binary python-dotenv

    - name: Ejecutar el Scraper de Libros
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: python app-libros.py