# .github/workflows/scraper.yml
name: Scraper Buscalibre Diario

on:
  schedule:
    - cron: '0 12,18 * * *' # Ejecuta a mediodía y tarde
  workflow_dispatch: # Permite ejecutarlo a mano desde el botón en GitHub

jobs:
  scrape-y-notificar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Acelera la instalación usando caché de dependencias

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Orquestador
        env:
          # Base de Datos
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          
          # APIs y Notificaciones
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          
          # Variables de Comportamiento (Opcional, sobrescribe settings.py)
          MAX_RETRIES: 3
        run: |
          python main.py